spring:
  application:
    name: webshop-backend
  datasource:
    url: jdbc:sqlite:./data/webshop.db?busy_timeout=5000&journal_mode=WAL
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.community.dialect.SQLiteDialect
      hibernate.globally_quoted_identifiers: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    mixed: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
server:
  port: 8080
app:
  media:
    storage-path: ./data/media
    public-base-url: http://localhost:8080/media
